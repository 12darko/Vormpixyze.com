server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: route everything to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
